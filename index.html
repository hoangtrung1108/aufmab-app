<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AufmaB Beta</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">

<!-- ==================== SCREEN 1: MEASUREMENT CARDS (Bìa) ==================== -->
<div class="screen active" id="s1">
  <div class="hdr">
    <span class="ttl">AufmaB Beta <span style="font-size:10px;opacity:0.7">v48</span></span>
    <span id="offlineBadge" style="display:none;font-size:11px;background:#ef5350;color:#fff;border-radius:12px;padding:2px 8px;margin-left:4px">📡 Offline</span>
    <span class="badge" id="syncBadge" style="display:none">0</span>
    <button onclick="exportExcel()" title="Excel Export" style="background:#2e7d32;border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:3px 8px;border-radius:4px;flex-shrink:0">&#128202;XL</button>
    <button id="syncBtn" style="background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:4px 8px" onclick="doSync()" title="Sync">&#8635;</button>
    <button onclick="repairCardIds()" title="Reparieren (Karten zusammenführen)" style="background:#e65100;border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:3px 7px;border-radius:4px;flex-shrink:0">&#128295;</button>
  </div>
  <div class="scr" id="s1List"></div>
  <button class="fab" onclick="showSheet('NewCard');initGewerkChips()">+</button>
</div>

<!-- ==================== SCREEN 2: PHONG DETAIL ==================== -->
<div class="screen" id="s2">
  <div class="hdr">
    <button class="back" onclick="goS1()">&larr;</button>
    <span class="ttl" id="s2Title"></span>
    <span id="s2GrandTotal" style="display:none;font-size:11px;font-weight:700;background:rgba(255,255,255,0.25);border-radius:4px;padding:2px 6px;flex-shrink:0;white-space:nowrap"></span>
    <button id="btnPull" type="button" title="Pull: Sheet \u2192 App" onclick="pullOnly()"
      style="background:#546e7a;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0">&#8595;</button>
    <button id="btnSave" type="button" title="Push: App \u2192 Sheet" onclick="saveAndSync()"
      style="background:#43a047;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0">&#8593;</button>
  </div>
  <div class="scr" id="s2Body"></div>

  <!-- Photo strip — collapsible, chỉ hiện khi có ảnh -->
  <div id="s2PhotoStrip" style="display:none;border-top:1px solid #90caf9">
    <div style="display:flex;align-items:center;padding:4px 10px;background:#e3f2fd;gap:6px">
      <span style="font-size:12px;font-weight:700;color:#1565c0">&#128247; <span id="s2PhotoCount">0</span> Fotos</span>
    </div>
    <div id="s2PhotoGrid" style="display:none;gap:8px;overflow-x:auto;padding:8px 10px;background:#fafafa;-webkit-overflow-scrolling:touch"></div>
  </div>

  <div class="bbar">
    <button class="bb bb-primary" id="btnAddGew" onclick="openBsGew(curPhong&&curPhong.card_nhom||'',false)">+ Gewerk / DN</button>
    <div style="flex:1;display:flex;gap:0">
      <label class="bb bb-sec" style="cursor:pointer;flex:4;border-radius:8px 0 0 8px;margin:0">
        &#128247; Foto
        <input type="file" accept="image/*" capture="environment" class="hidden-input" onchange="capturePhoto(event)">
      </label>
      <button type="button" id="bbarPhotoToggle" onclick="togglePhotoStrip()"
        class="bb bb-sec" style="flex:1;border-radius:0 8px 8px 0;margin:0;border-left:1px solid #ddd;font-size:16px;padding:0">
        <span id="bbarPhotoArrow">&#9660;</span>
      </button>
    </div>
  </div>
</div>

<!-- Sheet: New Measurement Card (Bìa mới) -->
<div class="ov" id="ovNewCard" onclick="closeSheet('NewCard')"></div>
<div class="bs" id="bsNewCard">
  <h3>Neues Aufma&szlig;blatt</h3>
  <div class="fld"><label>Raum-Nr / Zone</label>
    <input id="ncRoom" placeholder="z.B. 041, Zone1..." oninput="smartSearch('ncRoom')" onfocus="smartSearch('ncRoom')" autocomplete="off">
  </div>
  <div class="fld"><label>Name</label>
    <input id="ncName" placeholder="z.B. Reinigungszentrale" oninput="smartSearch('ncName')" onfocus="smartSearch('ncName')" autocomplete="off">
  </div>
  <div class="fld"><label>Etage</label>
    <input id="ncTang" placeholder="z.B. EG, 1.OG" oninput="smartSearch('ncTang')" onfocus="smartSearch('ncTang')" autocomplete="off">
  </div>
  <div class="fld"><label>Bereich</label>
    <input id="ncKV" placeholder="z.B. Randbau West" oninput="smartSearch('ncKV')" onfocus="smartSearch('ncKV')" autocomplete="off">
  </div>
  <div id="ncResults" style="max-height:180px;overflow-y:auto;border:1px solid #ddd;border-radius:6px;display:none;background:#fff;margin:-4px 0 8px"></div>
  <div class="fld">
    <label>Gewerk <span id="ncGewCount" style="color:#1565c0;font-size:11px;font-weight:700"></span></label>
    <div id="ncGewChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
    <div style="display:flex;gap:5px;margin-top:8px;align-items:center">
      <input id="ncCustomGewInp" placeholder="Neues Gewerk..." autocomplete="off" autocorrect="off" spellcheck="false"
        style="flex:1;padding:6px 10px;border:1.5px solid #c5d8f5;border-radius:6px;font-size:13px"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomGewerk();}">
      <button onclick="addCustomGewerk()" style="padding:6px 14px;background:#1565c0;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0">+</button>
    </div>
  </div>
  <div class="fld"><label>Notiz (optional)</label><input id="ncNote" placeholder="z.B. Zone1, Achse 38-39"></div>
  <div class="sact">
    <button class="bb bb-sec" onclick="closeSheet('NewCard');selectedGewerke.clear()">Abbrechen</button>
    <button class="bb bb-primary" onclick="createCard()">Erstellen</button>
  </div>
</div>

<!-- ==================== SCREEN 3: MATERIAL PREVIEW ==================== -->
<div class="screen" id="s3">
  <div class="hdr">
    <button class="back" onclick="goBackFromS3()">&larr;</button>
    <span class="ttl" id="s3Title">Materialien w&auml;hlen</span>
    <button id="btnS3Ok" style="background:#43a047;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0" onclick="confirmMaterials()">&#10003; Erstellen</button>
  </div>
  <div id="s3Info" style="padding:7px 14px;background:#e8f5e9;font-size:12px;color:#2e7d32;flex-shrink:0;border-bottom:1px solid #c8e6c9"></div>
  <div style="padding:6px 14px;background:#fafafa;border-bottom:1px solid #eee;flex-shrink:0;display:flex;justify-content:space-between;align-items:center">
    <span id="s3Count" style="font-size:12px;color:#888"></span>
    <button onclick="toggleAllS3()" style="font-size:12px;color:#1565c0;background:none;border:none;cursor:pointer;font-weight:600">Alle umschalten</button>
  </div>
  <div class="scr" id="s3Body"></div>
</div>

<!-- Context menu for Gewerk -->
<div id="gewCtx">
  <div class="ctx-item danger" id="gewCtxXoa">✕ Xóa cấu kiện</div>
  <div class="ctx-item" id="gewCtxAddDN">+ Thêm DN mới</div>
  <div class="ctx-item" id="gewCtxAddMat">⊕ Thêm cấu kiện mới</div>
  <div class="ctx-item dim" id="gewCtxClone">⧉ Nhân bản</div>
</div>

<!-- Confirmation modal for card delete / duplicate -->
<div id="cardConfirm">
  <div class="cc-box">
    <div class="cc-icon" id="ccIcon">🗑</div>
    <div class="cc-msg" id="ccMsg">Bạn có chắc muốn xóa thẻ này không?</div>
    <div class="cc-sub" id="ccSub">Tất cả dữ liệu đã nhập trong thẻ sẽ bị xóa.</div>
    <div class="cc-room-wrap" id="ccRoomWrap" style="display:none">
      <label class="cc-room-lbl">Mã phòng cho bản sao:</label>
      <input class="cc-room-inp" id="ccRoomInp" placeholder="VD: 036" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="cc-btns">
      <button class="cc-no" onclick="closeCardConfirm()">Không</button>
      <button class="cc-yes del" id="ccYes" onclick="executeCardAction()">Có</button>
    </div>
  </div>
</div>

<!-- Sheet: Add New Material -->
<div class="ov" id="ovNewMat" onclick="closeSheet('NewMat')"></div>
<div class="bs" id="bsNewMat">
  <h3>Neues Bauteil &mdash; <span id="nmGewLabel" style="color:#1565c0"></span></h3>
  <div class="fld">
    <label>Bauteilname (Bezeichnung)</label>
    <input id="nmName" placeholder="z.B. Pressfitting, Formstück...">
  </div>
  <div class="fld">
    <label>Einheit</label>
    <div id="nmUnitChips" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px"></div>
  </div>
  <p id="nmInfo" style="font-size:11px;color:#888;margin-top:6px"></p>
  <div class="sact">
    <button class="bb bb-sec" onclick="closeSheet('NewMat')">Abbrechen</button>
    <button class="bb bb-primary" onclick="addNewMaterial()">⊕ Erstellen</button>
  </div>
</div>

<!-- Sheet: Add DN (Gewerk already known from card) -->
<div class="ov" id="ovGew" onclick="closeSheet('Gew')"></div>
<div class="bs" id="bsGew">
  <h3>DN hinzuf&uuml;gen</h3>
  <div class="fld">
    <label>Gewerk</label>
    <!-- Locked: single gewerk label (from + DN header button) -->
    <div id="bsGewLocked" style="display:none;padding:7px 10px;background:#e3f2fd;border-radius:6px;font-size:14px;font-weight:700;color:#1565c0"></div>
    <!-- Unlocked: chip selector (from bottom + Gewerk/DN button) -->
    <div id="bsGewChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
  </div>
  <!-- DN sections — one per selected Gewerk, rendered dynamically -->
  <div id="dnSections" style="margin-top:4px"></div>
  <div class="fld" style="margin-top:6px">
    <label style="font-size:11px;color:#888">Manuell <span id="dnSelectedCount" style="color:#1565c0;font-weight:700;margin-left:6px"></span></label>
    <input id="nGewDN" placeholder="z.B. DN100 — gilt f&uuml;r alle Gewerke" style="margin-top:4px">
  </div>
  <p style="font-size:11px;color:#888">Alle Materialien werden automatisch erstellt</p>
  <div class="sact">
    <button class="bb bb-sec" onclick="closeSheet('Gew')">Abbrechen</button>
    <button class="bb bb-primary" onclick="goToS3()">Weiter &rarr;</button>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<!-- JS modules — load order matters for init only, functions are hoisted -->
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/sync.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/output.js"></script>
<script src="js/app.js"></script>
</body>
</html>
