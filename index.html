<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AufmaB Beta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0f0;color:#1a1a1a;font-size:15px;overflow:hidden;touch-action:manipulation}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* HEADER */
.hdr{background:#1565c0;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;min-height:48px;flex-shrink:0}
.hdr .back{font-size:20px;cursor:pointer;padding:2px 6px;border:none;background:none;color:#fff}
.hdr .ttl{flex:1;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .badge{background:#ff5722;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}

/* SEARCH */
.sbar{padding:6px 12px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0}
.sbar input{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;outline:none}

/* SCROLLABLE */
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}

/* GROUP HEADER */
.grp-hdr{padding:6px 12px;background:#e3f2fd;font-size:12px;font-weight:600;color:#1565c0;position:sticky;top:0;z-index:1}

/* ===== SCREEN 1: PHONG BLOCKS ===== */
.phong-block{margin:6px 10px;padding:10px 12px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border-left:4px solid #1565c0}
.phong-block:active{background:#e3f2fd}
.pb-top{display:flex;justify-content:space-between;align-items:center}
.pb-name{font-size:14px;font-weight:700}
.pb-tang{font-size:11px;color:#888}
.pb-summary{margin-top:4px;display:flex;flex-wrap:wrap;gap:3px}
.pb-badge{padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.pb-badge.luft{background:#e1f5fe;color:#0277bd}
.pb-badge.heiz{background:#fce4ec;color:#c62828}
.pb-badge.kalt{background:#e0f7fa;color:#00695c}
.pb-badge.abw{background:#f3e5f5;color:#6a1b9a}
.pb-badge.halt{background:#fff3e0;color:#e65100}
.pb-badge.brand{background:#ffebee;color:#b71c1c}
.pb-badge.other{background:#f5f5f5;color:#555}
.pb-empty{font-size:11px;color:#bbb;margin-top:4px}
/* Card action icon buttons — inline in pb-top, no extra row */
.pb-top-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.pb-act-btn{background:none;border:1.5px solid transparent;font-size:14px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;transition:all .15s;flex-shrink:0;padding:0;line-height:1}
.pb-act-btn.del{color:#e53935;border-color:#ffcdd2;background:#fff5f5}
.pb-act-btn.del:active{background:#ffcdd2}
.pb-act-btn.dup{color:#2e7d32;border-color:#c8e6c9;background:#f1f8f1}
.pb-act-btn.dup:active{background:#c8e6c9}
/* room input in dup modal */
.cc-room-wrap{margin-bottom:16px;text-align:left}
.cc-room-lbl{font-size:11px;color:#888;margin-bottom:4px;display:block}
.cc-room-inp{width:100%;padding:8px 10px;border:1.5px solid #c5d8f5;border-radius:8px;font-size:15px;font-weight:700;color:#1565c0;outline:none;font-family:inherit;background:#f0f4ff;text-transform:uppercase}
.cc-room-inp:focus{border-color:#1565c0}
/* Prevent card blue-flash when tapping its own action buttons */
.phong-block:has(.pb-act-btn:active){background:#fff}
/* Confirmation modal */
#cardConfirm{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);align-items:center;justify-content:center}
#cardConfirm.open{display:flex}
.cc-box{background:#fff;border-radius:14px;padding:24px 22px 18px;width:min(320px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center}
.cc-icon{font-size:32px;margin-bottom:10px}
.cc-msg{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:6px;line-height:1.4}
.cc-sub{font-size:12px;color:#888;margin-bottom:18px}
.cc-btns{display:flex;gap:10px;justify-content:center}
.cc-no{flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:#555}
.cc-yes{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#fff}
.cc-yes.del{background:#e53935}
.cc-yes.dup{background:#1565c0}

/* ===== SCREEN 2: PHONG DETAIL ===== */
.gew-sec{margin:6px 10px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.06);overflow:hidden}
.gew-hdr{padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.gew-hdr.luft{background:#e1f5fe;color:#0277bd}
.gew-hdr.heiz{background:#fce4ec;color:#c62828}
.gew-hdr.kalt{background:#e0f7fa;color:#00695c}
.gew-hdr.abw{background:#f3e5f5;color:#6a1b9a}
.gew-hdr.halt{background:#fff3e0;color:#e65100}
.gew-hdr.brand{background:#ffebee;color:#b71c1c}
.gew-hdr.other{background:#f5f5f5;color:#555}
.gew-body{padding:0}
.gew-body.collapsed{display:none}

/* DN block inside gewerk */
.dn-block{border-top:1px solid #eee;padding:6px 12px 8px}
.dn-title{font-size:13px;font-weight:700;color:#1565c0;margin-bottom:4px;padding:2px 0;border-bottom:1px dashed #e0e0e0}

/* Material row */
.mr{display:flex;align-items:center;padding:4px 0;gap:6px;border-bottom:1px solid #f0f0f0;min-height:34px;flex-wrap:wrap}
/* Note — collapsed: icon nhỏ trên cùng hàng; expanded: dòng thứ 2 */
.mr-note-btn{background:none;border:1px solid #e0e0e0;border-radius:5px;padding:2px 6px;font-size:13px;cursor:pointer;color:#ccc;flex-shrink:0;line-height:1.2;transition:all 0.15s}
.mr-note-btn.filled{color:#e65100;border-color:#f9a825;background:#fff8e1}
.mr-note-wrap{flex:0 0 100%;padding:2px 4px 6px 0;display:none;gap:6px;align-items:center}
.mr-note-wrap.open{display:flex}
.mr-note{flex:1;border:1.5px solid #f9a825;border-radius:6px;padding:6px 8px;font-size:12px;color:#333;background:#fffde7;outline:none;font-family:inherit}
.mr-note::placeholder{color:#bbb;font-style:italic}
.mr-note-ok{padding:4px 12px;background:#1565c0;border:none;border-radius:5px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;height:30px}
.mr-label{font-size:12px;font-weight:600;width:88px;flex-shrink:0;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mr-box{flex:1;min-height:28px;padding:2px 8px;background:#f0f4ff;border:1.5px solid #c5d8f5;border-radius:6px;cursor:text;display:flex;align-items:center;gap:3px;min-width:0;overflow:hidden}
.mr-box:hover{border-color:#1565c0}
.mr-box-txt{font-size:12px;color:#1565c0;font-weight:600;white-space:nowrap}
.mr-box-eq{font-size:12px;font-weight:700;color:#333;white-space:nowrap;margin-left:2px}
.mr-box-ph{font-size:11px;color:#bbb;font-style:italic}
.mr-box-inp{border:none;background:transparent;outline:none;font-size:12px;color:#333;width:100%;min-width:40px}
.mr-btns{display:flex;gap:3px;align-items:center;flex-shrink:0}

/* Buttons */
.ib{padding:4px 7px;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none}
.ib-hold{background:#2e7d32;color:#fff}
.ib-tap{background:#1565c0;color:#fff}
.ib-seg{background:#e3f2fd;color:#1565c0;font-size:11px}
.inum{width:40px;padding:4px;border:1px solid #ccc;border-radius:4px;font-size:12px;text-align:center}
.ib-ok{background:#ff9800;color:#fff}
.ib-heso{background:#fff3e0;color:#e65100;font-size:12px;min-width:28px;text-align:center;border:1.5px solid #ffcc80}
.ib-del{background:#ffebee;color:#c62828;font-size:14px;width:22px;min-width:22px;padding:0;text-align:center;flex-shrink:0;line-height:24px}
.gew-del{background:rgba(0,0,0,.15);border:none;color:#fff;font-size:15px;cursor:pointer;padding:0 5px;border-radius:4px;line-height:1.4;flex-shrink:0}
.gew-menu{background:rgba(0,0,0,.15);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;padding:2px 8px;border-radius:4px;line-height:1.6;flex-shrink:0;letter-spacing:1px}
.gew-menu.del-on{background:rgba(198,40,40,.5)}
.gew-adddn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:2px 7px;border-radius:4px;flex-shrink:0}
/* Context menu */
#gewCtx{display:none;position:fixed;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.22);z-index:300;min-width:170px;overflow:hidden}
.ctx-item{padding:13px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;gap:10px}
.ctx-item:last-child{border-bottom:none}
.ctx-item:active{background:#f5f5f5}
.ctx-item.danger{color:#c62828}
.ctx-item.dim{color:#aaa}
.gew-chip{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid transparent;background:#e3f2fd;color:#1565c0}
.gew-chip.sel{background:#1565c0;color:#fff;border-color:#0d47a1}
/* Screen 3 */
.s3-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f0f0f0;gap:10px;cursor:pointer;transition:background .1s}
.s3-row:active{background:#f5f5f5}
.s3-tog{width:30px;height:30px;border-radius:15px;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.s3-tog.on{background:#e8f5e9;color:#2e7d32}
.s3-tog.off{background:#f0f0f0;color:#bbb}
.s3-name{flex:1;font-size:14px;color:#1a1a1a}
.s3-unit{font-size:11px;color:#888;background:#f0f0f0;padding:2px 7px;border-radius:10px;flex-shrink:0;white-space:nowrap}

/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;padding:8px 12px;background:#fff;border-top:1px solid #ddd;display:flex;gap:6px;z-index:10}
.bb{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.bb-primary{background:#1565c0;color:#fff}
.bb-primary:active{background:#0d47a1}
.bb-sec{background:#f5f5f5;color:#333;border:1px solid #ddd}

/* FAB */
.fab{position:fixed;bottom:62px;right:14px;width:50px;height:50px;border-radius:25px;background:#1565c0;color:#fff;font-size:26px;border:none;box-shadow:0 3px 10px rgba(0,0,0,.2);cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}

/* OVERLAY + BOTTOM SHEET */
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100}
.ov.show{display:block}
.bs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:14px 14px 0 0;padding:16px;z-index:101;transform:translateY(100%);transition:transform .25s;max-height:75vh;overflow-y:auto}
.bs.show{transform:translateY(0)}
.bs h3{font-size:15px;margin-bottom:10px}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:12px;color:#888;margin-bottom:3px}
.fld input,.fld select{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:14px;outline:none}
.sact{display:flex;gap:6px;margin-top:12px}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Token popup */
.tpop{position:absolute;background:#fff;border-radius:6px;box-shadow:0 3px 12px rgba(0,0,0,.2);padding:5px;z-index:50;display:flex;gap:3px;align-items:center}
.tpop input{width:40px;padding:3px;border:1px solid #ccc;border-radius:4px;font-size:12px;text-align:center}
.tpop .tdel{background:#ffebee;color:#d32f2f;padding:3px 6px;border-radius:4px;border:none;cursor:pointer;font-size:13px}
.hidden-input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
</style>
</head>
<body>
<div id="app">

<!-- ==================== SCREEN 1: MEASUREMENT CARDS (Bìa) ==================== -->
<div class="screen active" id="s1">
  <div class="hdr">
    <span class="ttl">AufmaB Beta <span style="font-size:10px;opacity:0.7">v48</span></span>
    <span id="offlineBadge" style="display:none;font-size:11px;background:#ef5350;color:#fff;border-radius:12px;padding:2px 8px;margin-left:4px">📡 Offline</span>
    <span class="badge" id="syncBadge" style="display:none">0</span>
    <button onclick="exportExcel()" title="Excel Export" style="background:#2e7d32;border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:3px 8px;border-radius:4px;flex-shrink:0">&#128202;XL</button>
    <button id="syncBtn" style="background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:4px 8px" onclick="doSync()" title="Sync">&#8635;</button>
    <button onclick="repairCardIds()" title="Reparieren (Karten zusammenführen)" style="background:#e65100;border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;padding:3px 7px;border-radius:4px;flex-shrink:0">&#128295;</button>
  </div>
  <div class="scr" id="s1List"></div>
  <button class="fab" onclick="showSheet('NewCard');initGewerkChips()">+</button>
</div>

<!-- ==================== SCREEN 2: PHONG DETAIL ==================== -->
<div class="screen" id="s2">
  <div class="hdr">
    <button class="back" onclick="goS1()">&larr;</button>
    <span class="ttl" id="s2Title"></span>
    <span id="s2GrandTotal" style="display:none;font-size:11px;font-weight:700;background:rgba(255,255,255,0.25);border-radius:4px;padding:2px 6px;flex-shrink:0;white-space:nowrap"></span>
    <button id="btnPull" type="button" title="Pull: Sheet \u2192 App" onclick="pullOnly()"
      style="background:#546e7a;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0">&#8595;</button>
    <button id="btnSave" type="button" title="Push: App \u2192 Sheet" onclick="saveAndSync()"
      style="background:#43a047;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0">&#8593;</button>
  </div>
  <div class="scr" id="s2Body"></div>

  <!-- Photo strip — collapsible, chỉ hiện khi có ảnh -->
  <div id="s2PhotoStrip" style="display:none;border-top:1px solid #90caf9">
    <div style="display:flex;align-items:center;padding:4px 10px;background:#e3f2fd;gap:6px">
      <span style="font-size:12px;font-weight:700;color:#1565c0">&#128247; <span id="s2PhotoCount">0</span> Fotos</span>
    </div>
    <div id="s2PhotoGrid" style="display:none;gap:8px;overflow-x:auto;padding:8px 10px;background:#fafafa;-webkit-overflow-scrolling:touch"></div>
  </div>

  <div class="bbar">
    <button class="bb bb-primary" id="btnAddGew" onclick="openBsGew(curPhong&&curPhong.card_nhom||'',false)">+ Gewerk / DN</button>
    <div style="flex:1;display:flex;gap:0">
      <label class="bb bb-sec" style="cursor:pointer;flex:4;border-radius:8px 0 0 8px;margin:0">
        &#128247; Foto
        <input type="file" accept="image/*" capture="environment" class="hidden-input" onchange="capturePhoto(event)">
      </label>
      <button type="button" id="bbarPhotoToggle" onclick="togglePhotoStrip()"
        class="bb bb-sec" style="flex:1;border-radius:0 8px 8px 0;margin:0;border-left:1px solid #ddd;font-size:16px;padding:0">
        <span id="bbarPhotoArrow">&#9660;</span>
      </button>
    </div>
  </div>
</div>

<!-- Sheet: New Measurement Card (Bìa mới) -->
<div class="ov" id="ovNewCard" onclick="closeSheet('NewCard')"></div>
<div class="bs" id="bsNewCard">
  <h3>Neues Aufma&szlig;blatt</h3>
  <div class="fld"><label>Raum-Nr / Zone</label>
    <input id="ncRoom" placeholder="z.B. 041, Zone1..." oninput="smartSearch('ncRoom')" onfocus="smartSearch('ncRoom')" autocomplete="off">
  </div>
  <div class="fld"><label>Name</label>
    <input id="ncName" placeholder="z.B. Reinigungszentrale" oninput="smartSearch('ncName')" onfocus="smartSearch('ncName')" autocomplete="off">
  </div>
  <div class="fld"><label>Etage</label>
    <input id="ncTang" placeholder="z.B. EG, 1.OG" oninput="smartSearch('ncTang')" onfocus="smartSearch('ncTang')" autocomplete="off">
  </div>
  <div class="fld"><label>Bereich</label>
    <input id="ncKV" placeholder="z.B. Randbau West" oninput="smartSearch('ncKV')" onfocus="smartSearch('ncKV')" autocomplete="off">
  </div>
  <div id="ncResults" style="max-height:180px;overflow-y:auto;border:1px solid #ddd;border-radius:6px;display:none;background:#fff;margin:-4px 0 8px"></div>
  <div class="fld">
    <label>Gewerk <span id="ncGewCount" style="color:#1565c0;font-size:11px;font-weight:700"></span></label>
    <div id="ncGewChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
    <div style="display:flex;gap:5px;margin-top:8px;align-items:center">
      <input id="ncCustomGewInp" placeholder="Neues Gewerk..." autocomplete="off" autocorrect="off" spellcheck="false"
        style="flex:1;padding:6px 10px;border:1.5px solid #c5d8f5;border-radius:6px;font-size:13px"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomGewerk();}">
      <button onclick="addCustomGewerk()" style="padding:6px 14px;background:#1565c0;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0">+</button>
    </div>
  </div>
  <div class="fld"><label>Notiz (optional)</label><input id="ncNote" placeholder="z.B. Zone1, Achse 38-39"></div>
  <div class="sact">
    <button class="bb bb-sec" onclick="closeSheet('NewCard');selectedGewerke.clear()">Abbrechen</button>
    <button class="bb bb-primary" onclick="createCard()">Erstellen</button>
  </div>
</div>

<!-- ==================== SCREEN 3: MATERIAL PREVIEW ==================== -->
<div class="screen" id="s3">
  <div class="hdr">
    <button class="back" onclick="goBackFromS3()">&larr;</button>
    <span class="ttl" id="s3Title">Materialien w&auml;hlen</span>
    <button id="btnS3Ok" style="background:#43a047;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0" onclick="confirmMaterials()">&#10003; Erstellen</button>
  </div>
  <div id="s3Info" style="padding:7px 14px;background:#e8f5e9;font-size:12px;color:#2e7d32;flex-shrink:0;border-bottom:1px solid #c8e6c9"></div>
  <div style="padding:6px 14px;background:#fafafa;border-bottom:1px solid #eee;flex-shrink:0;display:flex;justify-content:space-between;align-items:center">
    <span id="s3Count" style="font-size:12px;color:#888"></span>
    <button onclick="toggleAllS3()" style="font-size:12px;color:#1565c0;background:none;border:none;cursor:pointer;font-weight:600">Alle umschalten</button>
  </div>
  <div class="scr" id="s3Body"></div>
</div>

<!-- Context menu for Gewerk -->
<div id="gewCtx">
  <div class="ctx-item danger" id="gewCtxXoa">✕ Xóa cấu kiện</div>
  <div class="ctx-item" id="gewCtxAddDN">+ Thêm DN mới</div>
  <div class="ctx-item" id="gewCtxAddMat">⊕ Thêm cấu kiện mới</div>
  <div class="ctx-item dim" id="gewCtxClone">⧉ Nhân bản</div>
</div>

<!-- Confirmation modal for card delete / duplicate -->
<div id="cardConfirm">
  <div class="cc-box">
    <div class="cc-icon" id="ccIcon">🗑</div>
    <div class="cc-msg" id="ccMsg">Bạn có chắc muốn xóa thẻ này không?</div>
    <div class="cc-sub" id="ccSub">Tất cả dữ liệu đã nhập trong thẻ sẽ bị xóa.</div>
    <div class="cc-room-wrap" id="ccRoomWrap" style="display:none">
      <label class="cc-room-lbl">Mã phòng cho bản sao:</label>
      <input class="cc-room-inp" id="ccRoomInp" placeholder="VD: 036" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="cc-btns">
      <button class="cc-no" onclick="closeCardConfirm()">Không</button>
      <button class="cc-yes del" id="ccYes" onclick="executeCardAction()">Có</button>
    </div>
  </div>
</div>

<!-- Sheet: Add New Material -->
<div class="ov" id="ovNewMat" onclick="closeSheet('NewMat')"></div>
<div class="bs" id="bsNewMat">

// ---- IndexedDB ----
function openDB(){
  return new Promise(function(ok,fail){
    var r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=function(e){
      var d=e.target.result;
      if(!d.objectStoreNames.contains('phong'))d.createObjectStore('phong',{keyPath:'id'});
      if(!d.objectStoreNames.contains('vat_lieu')){var s=d.createObjectStore('vat_lieu',{keyPath:'ma_vl'});s.createIndex('nhom','nhom',{unique:false});}
      if(!d.objectStoreNames.contains('dem_le')){var s=d.createObjectStore('dem_le',{keyPath:'local_id'});s.createIndex('ma_phong','ma_phong',{unique:false});s.createIndex('sync_status','sync_status',{unique:false});}
      if(!d.objectStoreNames.contains('anh')){var s=d.createObjectStore('anh',{keyPath:'anh_id'});s.createIndex('ma_phong','ma_phong',{unique:false});}
    };
    r.onsuccess=function(e){db=e.target.result;ok(db);};
    r.onerror=function(e){fail(e.target.error);};
  });
}
function dbPut(s,d){return new Promise(function(ok,fail){var tx=db.transaction(s,'readwrite');tx.objectStore(s).put(d);tx.oncomplete=ok;tx.onerror=function(e){fail(e.target.error);}});}
function dbGetAll(s){return new Promise(function(ok,fail){var tx=db.transaction(s,'readonly');var r=tx.objectStore(s).getAll();r.onsuccess=function(){ok(r.result);};r.onerror=function(e){fail(e.target.error);}});}
function dbGet(s,k){return new Promise(function(ok,fail){var tx=db.transaction(s,'readonly');var r=tx.objectStore(s).get(k);r.onsuccess=function(){ok(r.result);};r.onerror=function(e){fail(e.target.error);}});}
function dbIdx(s,idx,v){return new Promise(function(ok,fail){var tx=db.transaction(s,'readonly');var r=tx.objectStore(s).index(idx).getAll(v);r.onsuccess=function(){ok(r.result);};r.onerror=function(e){fail(e.target.error);}});}
function uuid(){return 'xxxx-xxxx-xxxx'.replace(/x/g,function(){return(Math.random()*16|0).toString(16)});}

// Tự lưu/load Gewerk và DN tự tạo vào localStorage
function saveCustomData(){
  var BUILTIN_GEW=['Lüftung','Heizung','Kälte','Abwasser','Halterung','Brandschutz','Sanitär','Elektro'];
  var BUILTIN_DN={'Lüftung':['DN100','DN125','DN160','DN200','DN250','DN315'],
    'Heizung':['DN15','DN20','DN25','DN32','DN40','DN50','DN65'],
    'Kälte':['DN15','DN20','DN25','DN32','DN40','DN50','DN65'],
    'Abwasser':['DN50','DN70','DN90','DN100','DN110','DN125','DN150','DN200'],
    'Halterung':['M10','M41','M42','M72'],'Brandschutz':['DN100','DN125','DN150','DN200'],
    'Sanitär':['DN10','DN15','DN20','DN25','DN32','DN40','DN50','DN65','DN80','DN100'],
    'Elektro':['M16','M20','M25','M32','M50','M63']};
  var extraGew=ALL_GEWERKE.filter(function(g){return!BUILTIN_GEW.includes(g);});
  var extraDN={};
  Object.keys(DN_PRESETS).forEach(function(g){
    var def=BUILTIN_DN[g]||[];
    var extra=(DN_PRESETS[g]||[]).filter(function(dn){return!def.includes(dn);});
    if(extra.length>0)extraDN[g]=extra;
  });
  localStorage.setItem('aufmab_custom',JSON.stringify({gewerke:extraGew,dns:extraDN}));
}

function loadCustomData(){
  try{
    var saved=JSON.parse(localStorage.getItem('aufmab_custom')||'{}');
    (saved.gewerke||[]).forEach(function(g){if(!ALL_GEWERKE.includes(g))ALL_GEWERKE.push(g);});
    Object.keys(saved.dns||{}).forEach(function(g){
      if(!DN_PRESETS[g])DN_PRESETS[g]=[];
      (saved.dns[g]||[]).forEach(function(dn){if(!DN_PRESETS[g].includes(dn))DN_PRESETS[g].push(dn);});
    });
  }catch(e){console.warn('loadCustomData:',e);}
}

function addCustomGewerk(){
  var name=(document.getElementById('ncCustomGewInp').value||'').trim();
  if(!name){toast('Bitte Gewerk eingeben');return;}
  var c=document.getElementById('ncGewChips');
  if(ALL_GEWERKE.includes(name)){
    // Đã tồn tại — chỉ cần select chip tương ứng
    selectedGewerke.add(name);
    c.querySelectorAll('.gew-chip').forEach(function(ch){if(ch.textContent===name)ch.classList.add('sel');});
    toast(name+' ausgewählt');
  } else {
    // Tạo mới — thêm vào ALL_GEWERKE và thêm chip
    ALL_GEWERKE.push(name);
    saveCustomData();
    var chip=document.createElement('button');chip.className='gew-chip sel';chip.textContent=name;
    chip.onclick=function(e){
      e.preventDefault();
      if(selectedGewerke.has(name)){selectedGewerke.delete(name);chip.classList.remove('sel');}
      else{selectedGewerke.add(name);chip.classList.add('sel');}
      document.getElementById('ncGewCount').textContent=selectedGewerke.size>0?'('+selectedGewerke.size+' ausgewählt)':'';
    };
    c.appendChild(chip);
    selectedGewerke.add(name);
    toast('✓ '+name+' erstellt');
  }
  document.getElementById('ncGewCount').textContent='('+selectedGewerke.size+' ausgewählt)';
  document.getElementById('ncCustomGewInp').value='';
}

async function renderS1(){
  var demLes=await dbGetAll('dem_le');
  demLes=demLes.filter(function(d){return!d.deleted;});

  // Group by card: ma_phong + nhom = 1 card
  var cards={};
  demLes.forEach(function(d){
    var cardKey=(d.card_id)||(d.ma_phong+'|'+(d.nhom||''));
    if(!cards[cardKey]){
      cards[cardKey]={card_id:cardKey,ma_phong:d.ma_phong,nhom:d.nhom||'',nhomSet:new Set(),note:d.card_note||'',
        dns:new Set(),mats:{},created:d.created_at};
    }
    var card=cards[cardKey];
    if(d.nhom)card.nhomSet.add(d.nhom);
    // Gom tên DN (chỉ lấy tên, không đếm)
    if(d.grosse&&d.grosse!=='Befestigung')card.dns.add(d.grosse);
    // Gom tổng số liệu thực tế theo tên cấu kiện
    var vals=d.values||[];
    if(vals.length>0){
      var total=vals.reduce(function(a,b){return a+Number(b);},0);
      if(total>0){
        var key=d.ten_vl_german;
        if(!card.mats[key])card.mats[key]={total:0,kieu_tinh:d.kieu_tinh};
        card.mats[key].total+=total;
      }
    }
    if(d.created_at<card.created)card.created=d.created_at;
  });

  // Get phong names
  var phongs=await dbGetAll('phong');
  var phMap={};phongs.forEach(function(p){phMap[p.ma_phong]=p;});

  var c=document.getElementById('s1List');c.innerHTML='';
  var cardList=Object.values(cards).sort(function(a,b){return b.created-a.created;});

  if(cardList.length===0){
    c.innerHTML='<div style="padding:40px;text-align:center;color:#999">Keine Aufma\u00dfbl\u00e4tter.<br>Dr\u00fccke <b style="font-size:20px">+</b> um ein neues Blatt zu erstellen.<br><br><span style="font-size:12px">Jedes Blatt = 1 Raum + 1 Gewerk<br>(wie eine Kartonkarte)</span></div>';
    updateBadge();return;
  }

  cardList.forEach(function(card){
    var bl=document.createElement('div');bl.className='phong-block';

var _ccAction=null; // current pending action: {type:'del'|'dup', card:{...}}

function showCardConfirm(type, card){

function closeCardConfirm(){

}

async function executeCardAction(){
  if(!_ccAction)return;
  var type=_ccAction.type; var card=_ccAction.card;
  closeCardConfirm();
  if(type==='del') await doDeleteCard(card);
  else if(type==='dup') await doDuplicateCard(card);
}

async function doDeleteCard(card){
  var all=await dbGetAll('dem_le');
  var toDelete=all.filter(function(d){
    return !d.deleted&&(d.card_id===card.card_id);
  });
  var now=Date.now();
  for(var i=0;i<toDelete.length;i++){
    var r=toDelete[i];
    r.deleted=true; r.updated_at=now;
    if(r.sync_status==='synced') r.sync_status='dirty';
    else r.sync_status='pending';
    await dbPut('dem_le',r);
  }
  await renderS1();
}

async function doDuplicateCard(card){
  var all=await dbGetAll('dem_le');
  var originals=all.filter(function(d){
    return !d.deleted&&(d.card_id===card.card_id);
  });
  // New card_id: (possibly new) room + same Gewerk
  var parts=(card.card_id||'').split('|');
  var rawInp=(document.getElementById('ccRoomInp').value||'').trim().toUpperCase();
  var maPhong=rawInp||parts[0]||card.ma_phong;
  var gewStr=parts[1]||card.nhom||'';
  var newCardId=maPhong+'|'+gewStr+'|copy_'+Date.now();
  var now=Date.now();
  for(var i=0;i<originals.length;i++){
    var orig=originals[i];
    var newRec={};
    for(var k in orig) if(orig.hasOwnProperty(k)) newRec[k]=orig[k];
    newRec.local_id='le_'+now+'_'+i;
    newRec.card_id=newCardId;
    newRec.ma_phong=maPhong;
    newRec.values=[]; // reset counts — nhân bản thẻ trống
    newRec.he_so=orig.he_so||1;
    newRec.ghi_chu='';
    newRec.sync_status='pending';
    newRec.sheet_id=null;
    newRec.created_at=now;
    newRec.updated_at=now;
    await dbPut('dem_le',newRec);
  }
  await renderS1();
}

// Smart search — any field triggers search, select fills all 4
var selectedRoom=null;
var activeField=null;
async function smartSearch(fieldId){
  activeField=fieldId;
  var q=(document.getElementById(fieldId).value||'').toLowerCase();
  var res=document.getElementById('ncResults');

  var phongs=await dbGetAll('phong');

  // Search based on which field user is typing in — empty = show all
  var matches=phongs.filter(function(p){
    if(!q) return true; // show all when empty
    var searchText='';
    if(fieldId==='ncRoom') searchText=p.ma_phong||'';
    else if(fieldId==='ncName') searchText=p.ten_phong||'';
    else if(fieldId==='ncTang') searchText=p.tang||'';
    else if(fieldId==='ncKV') searchText=p.khu_vuc||'';
    return searchText.toLowerCase().indexOf(q)>=0;
  });

  // Deduplicate results based on field
  var seen={};var unique=[];
  matches.forEach(function(p){
    var key=p.ma_phong+'|'+p.ten_phong;
    if(!seen[key]){seen[key]=true;unique.push(p);}
  });
  unique=unique.slice(0,15);

  res.innerHTML='';res.style.display='block';

  // Position dropdown after the active field
  var fieldEl=document.getElementById(fieldId);
  fieldEl.parentNode.after(res);

  unique.forEach(function(p){
    var item=document.createElement('div');
    item.style.cssText='padding:8px 10px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
    item.onpointerdown=function(e){e.preventDefault();};
    item.innerHTML='<b>'+esc(p.ma_phong)+'</b> \u2013 '+esc(p.ten_phong)+' <span style="color:#888;font-size:11px">'+esc(p.tang)+' \u00b7 '+esc(p.khu_vuc)+'</span>';
    item.onclick=function(){
      selectedRoom=p;
      document.getElementById('ncRoom').value=p.ma_phong||'';
      document.getElementById('ncName').value=p.ten_phong||'';
      document.getElementById('ncTang').value=p.tang||'';
      document.getElementById('ncKV').value=p.khu_vuc||'';
      res.style.display='none';
    };
    res.appendChild(item);
  });

  if(unique.length===0){
    res.innerHTML='<div style="padding:8px;color:#888;font-size:12px">Nicht gefunden \u2014 manuell eingeben</div>';
  }
}

async function renderS2(){
  var records=await dbIdx('dem_le','ma_phong',curPhong.ma_phong);
  records=records.filter(function(r){return!r.deleted;});

  var tree={}; // nhom -> grosse -> [records]
  records.forEach(function(r){
    var g=r.nhom||'Sonstige';var dn=r.grosse||'?';
    if(!tree[g])tree[g]={};
    if(!tree[g][dn])tree[g][dn]=[];
    tree[g][dn].push(r);
  });

  // Tính tổng theo Gewerk và grand total (raw × he_so)
  function calcGewTotal(gew){
    var t=0;
    var dns=tree[gew]||{};
    Object.keys(dns).forEach(function(dn){
      dns[dn].forEach(function(r){
        var vals=r.values||[];if(!vals.length)return;
        var raw=vals.reduce(function(a,b){return a+Number(b);},0);
        t+=raw*(r.he_so||1);
      });
    });
    return t;
  }
  function fmtTotal(t){
    if(t===0)return '';
    return t===Math.floor(t)?'\u03A3\u00a0'+t:'\u03A3\u00a0'+(Math.round(t*100)/100);
  }

  var c=document.getElementById('s2Body');c.innerHTML='';
  var gewerke=Object.keys(tree).sort();

  if(gewerke.length===0){
    c.innerHTML='<div style="padding:30px;text-align:center;color:#999">Noch keine Daten.<br>Dr\u00fccke "+ Gewerk / DN"<br>z.B. L\u00fcftung + DN100</div>';
    var gt=document.getElementById('s2GrandTotal');if(gt)gt.style.display='none';
    return;
  }

  // Grand total header badge
  var grandTotal=gewerke.reduce(function(s,g){return s+calcGewTotal(g);},0);
  var gtEl=document.getElementById('s2GrandTotal');
  if(gtEl){
    if(grandTotal>0){
      gtEl.textContent=fmtTotal(grandTotal);
      gtEl.style.display='inline';
    } else {
      gtEl.style.display='none';
    }
  }

  gewerke.forEach(function(gew){
    var sec=document.createElement('div');sec.className='gew-sec';
    var hdr=document.createElement('div');hdr.className='gew-hdr '+gewCls(gew);
    var dns=Object.keys(tree[gew]).sort();
    var dnCount=dns.length;

    // Header: [Gewerk name] [flex] [+DN] [count▼] [×]
    var hdrName=document.createElement('span');hdrName.textContent=gew;
    var hdrSpacer=document.createElement('span');hdrSpacer.style.flex='1';
    var hdrAddDN=document.createElement('button');hdrAddDN.className='gew-adddn';hdrAddDN.textContent='+ DN';
    hdrAddDN.onclick=function(e){e.stopPropagation();openBsGew(gew,true);};
    var hdrCount=document.createElement('span');hdrCount.style.cssText='font-size:11px;font-weight:400;margin:0 6px';hdrCount.textContent=dnCount+' DN \u25BC';
    // Tổng Gewerk (raw × he_so)
    var gewTotal=calcGewTotal(gew);
    var hdrTotal=document.createElement('span');
    hdrTotal.style.cssText='font-size:11px;font-weight:700;background:rgba(0,0,0,0.1);border-radius:3px;padding:1px 6px;margin:0 4px;flex-shrink:0';
    hdrTotal.textContent=gewTotal>0?fmtTotal(gewTotal):'';
    hdrTotal.style.display=gewTotal>0?'inline':'none';
    // Delete mode badge in header
    var hdrDelBadge=document.createElement('span');
    hdrDelBadge.style.cssText='font-size:10px;background:rgba(198,40,40,.25);border-radius:3px;padding:1px 5px;font-weight:700;display:'+(gewDeleteMode[gew]?'inline':'none');
    hdrDelBadge.textContent='DEL';
    var hdrMenu=document.createElement('button');hdrMenu.className='gew-menu'+(gewDeleteMode[gew]?' del-on':'');
    hdrMenu.textContent='\u00b7\u00b7\u00b7';hdrMenu.title='Optionen';
    (function(g,btn){

    hdr.onclick=function(){

function buildMR(rec){
  var row=document.createElement('div');row.className='mr';
  var isDec=rec.kieu_tinh==='CO_DAI';
  var unit=rec.don_vi||(isDec?'m':'Stk');

  // Nút × xóa cấu kiện — bên trái, chỉ hiện khi gewerk ở delete mode
  var del=document.createElement('button');del.className='ib ib-del';del.textContent='\u00d7';del.title='L\u00f6schen';
  del.style.display=gewDeleteMode[rec.nhom]?'':'none';
  del.onclick=async function(e){
    e.stopPropagation();
    var r=await dbGet('dem_le',rec.local_id);
    if(r){r.deleted=true;r.updated_at=Date.now();if(r.sync_status==='synced')r.sync_status='dirty';await dbPut('dem_le',r);}
    await renderS2();updateBadge();
  };
  row.appendChild(del);

  // Label
  var lbl=document.createElement('span');lbl.className='mr-label';lbl.title=rec.ten_vl_german;lbl.textContent=rec.ten_vl_german;
  row.appendChild(lbl);

  // Single formula box
  var box=document.createElement('span');box.className='mr-box';box.id='tk_'+rec.local_id;

  function renderBox(editing){
    box.innerHTML='';
    if(editing){
      // iOS fix: tạo input + focus() SYNCHRONOUSLY trong user gesture context
      // Nếu focus() nằm trong .then() callback → iOS Safari không bật keyboard
      var inp=document.createElement('input');inp.type='text';inp.className='mr-box-inp';
      inp.placeholder=isDec?'3.5*2 / 2.5+1.8':'5+3*2 / (1+2)';
      inp.setAttribute('inputmode','decimal'); // 'decimal' cho số + dấu chấm, user có thể switch sang full KB
      box.appendChild(inp);
      inp.focus(); // phải synchronous — iOS kiểm tra gesture chain
      // Sau đó mới async load giá trị cũ để pre-populate
      dbGet('dem_le',rec.local_id).then(function(r){
        var vals=(r&&r.values)||rec.values||[];
        inp.value=vals.map(function(v){return isDec?Number(v).toFixed(1):Math.round(v);}).join('+');
        var len=inp.value.length;inp.setSelectionRange(len,len);
      });
      // Evaluate math expression safely — chỉ cho phép 0-9 + - * / ( ) . space
      function parseFormula(raw){
        if(!raw.trim())return[];
        // Chỉ cho pass ký tự an toàn
        var clean=raw.replace(/[^0-9+\-*/().\s]/g,'');
        if(!clean.trim())return[];
        // Nếu chỉ có + thì giữ từng phần riêng (audit trail)
        if(/^[\d.\s+]+$/.test(clean)){
          var parts=clean.split('+').map(function(s){return isDec?parseFloat(s.trim()):parseInt(s.trim());});
          return parts.filter(function(n){return!isNaN(n)&&n>0;});
        }
        // Có - * / () → evaluate toàn bộ expression
        try{
          var result=Function('"use strict";return('+clean+')')();
          if(isFinite(result)&&result>0)return[isDec?Math.round(result*100)/100:Math.round(result)];
        }catch(e){}
        return[];
      }
      async function save(){
        var raw=inp.value.trim();
        var parts=parseFormula(raw);
        var r2=await dbGet('dem_le',rec.local_id);if(!r2)return;
        r2.values=parts;r2.updated_at=Date.now();
        if(r2.sync_status==='synced')r2.sync_status='dirty';
        else if(r2.sync_status!=='dirty')r2.sync_status='pending';
        await dbPut('dem_le',r2);
        backupToLocalStorage(); // Backup ngay sau khi nhập công thức
        await renderS2();updateBadge();
      }
      inp.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();save();}if(e.key==='Escape'){renderBox(false);}};
      inp.onblur=function(e){
        var rel=e.relatedTarget;
        if(rel&&(rel.textContent==='+5'||rel.textContent==='+1'||rel.textContent==='+m'))return;
        save();
      };
    } else {
      // Display mode: async load là OK (không cần keyboard)
      dbGet('dem_le',rec.local_id).then(function(r){
        var vals=(r&&r.values)||rec.values||[];
        var total=vals.reduce(function(a,b){return a+Number(b);},0);
        box.innerHTML='';
        if(vals.length>0){
          var txt=document.createElement('span');txt.className='mr-box-txt';
          txt.textContent=vals.map(function(v){return isDec?Number(v).toFixed(1):Math.round(v);}).join('+');
          box.appendChild(txt);
          var eq=document.createElement('span');eq.className='mr-box-eq';
          eq.textContent=' = '+(isDec?total.toFixed(1):Math.round(total))+' '+unit;
          box.appendChild(eq);
        } else {
          var ph=document.createElement('span');ph.className='mr-box-ph';
          ph.textContent=isDec?'Tippen oder +m':'Tippen oder +1';
          box.appendChild(ph);
        }
      });
    }
  }
  renderBox(false);
  // Tap box OR use _edit() to enter edit mode — set synchronously so always ready
  box.onclick=function(e){e.stopPropagation();renderBox(true);};
  box._edit=function(){renderBox(true);};
  row.appendChild(box);

  // Buttons
  var btns=document.createElement('span');btns.className='mr-btns';
  if(rec.kieu_tinh==='CHI_DEM'){
    var b5=document.createElement('button');b5.className='ib ib-hold';b5.textContent='+5';
    b5.onclick=function(){tapVal(rec.local_id,5);};
    var b1=document.createElement('button');b1.className='ib ib-tap';b1.textContent='+1';
    b1.onclick=function(){tapVal(rec.local_id,1);};
    btns.appendChild(b5);btns.appendChild(b1);
  } else {
    // CO_DAI: × label + ô nhập số hệ số
    var curHeso=pendingHeSo[rec.local_id]!==undefined?pendingHeSo[rec.local_id]:(rec.he_so||1);
    var hesoWrap=document.createElement('span');
    hesoWrap.style.cssText='display:inline-flex;align-items:center;gap:2px;flex-shrink:0';
    var hesoX=document.createElement('span');
    hesoX.textContent='\u00d7';
    hesoX.style.cssText='font-size:12px;color:#e65100;font-weight:700;line-height:1';
    var hesoInp=document.createElement('input');
    hesoInp.type='number';hesoInp.min='1';hesoInp.max='99';hesoInp.step='1';
    hesoInp.value=curHeso>1?curHeso:''; // trống nếu =1 (mặc định)
    hesoInp.placeholder='1';
    hesoInp.style.cssText='width:36px;border:1.5px solid #ffcc80;border-radius:4px;padding:2px 4px;font-size:12px;color:#e65100;background:#fff3e0;text-align:center;-moz-appearance:textfield;-webkit-appearance:none';
    hesoInp.title='H\u1ec7 s\u1ed1 nh\u00e2n';
    function applyHeso(){
      var v=Math.max(1,parseInt(hesoInp.value)||1);
      hesoInp.value=v>1?v:''; // giữ trống nếu =1
      pendingHeSo[rec.local_id]=v;
      saveHeSo(rec.local_id,v);
    }
    hesoInp.onchange=applyHeso;
    hesoInp.onblur=function(e){e.stopPropagation();applyHeso();};
    hesoInp.onclick=function(e){e.stopPropagation();};
    hesoWrap.appendChild(hesoX);hesoWrap.appendChild(hesoInp);
    btns.appendChild(hesoWrap);
  }
  row.appendChild(btns);

  // Nút 📝 nhỏ — cùng hàng với btns
  var noteBtn = document.createElement('button');
  noteBtn.className = 'mr-note-btn' + (rec.ghi_chu ? ' filled' : '');
  noteBtn.title = rec.ghi_chu || 'Notiz hinzufügen';
  noteBtn.textContent = '📝';

  // Dòng thứ 2 (ẩn mặc định) — chỉ hiện khi bấm 📝
  var noteWrap = document.createElement('div');
  noteWrap.className = 'mr-note-wrap';
  var noteInp = document.createElement('input');
  noteInp.type = 'text';
  noteInp.className = 'mr-note';
  noteInp.placeholder = 'Notiz / Ghi chú...';
  noteInp.value = rec.ghi_chu || '';
  var noteOk = document.createElement('button');
  noteOk.className = 'mr-note-ok';
  noteOk.textContent = 'Ok';
  noteWrap.appendChild(noteInp);
  noteWrap.appendChild(noteOk);

  async function saveNote() {
    var r = await dbGet('dem_le', rec.local_id);
    if (!r) return;
    var v = noteInp.value.trim();
    if ((r.ghi_chu || '') !== v) {
      r.ghi_chu = v; r.updated_at = Date.now();
      if (r.sync_status === 'synced') r.sync_status = 'dirty';
      else if (r.sync_status !== 'dirty') r.sync_status = 'pending';
      await dbPut('dem_le', r); updateBadge();
    }
    noteBtn.className = 'mr-note-btn' + (v ? ' filled' : '');
    noteBtn.title = v || 'Notiz hinzufügen';
    noteWrap.classList.remove('open');
  }

  noteBtn.onclick = function(e) {
    e.stopPropagation();
    var opening = !noteWrap.classList.contains('open');
    noteWrap.classList.toggle('open');
    if (opening) { noteInp.focus(); noteInp.setSelectionRange(noteInp.value.length, noteInp.value.length); }
  };
  noteOk.onclick = function(e) { e.stopPropagation(); saveNote(); };
  noteInp.onblur = function(e) {
    if (e.relatedTarget === noteOk) return; // Ok button sẽ xử lý
    saveNote();
  };
  noteInp.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); saveNote(); }
    if (e.key === 'Escape') { noteWrap.classList.remove('open'); }
  };

  row.appendChild(noteBtn);
  row.appendChild(noteWrap);

  return row;
}

async function pVal(lid,val){
  var rec=await dbGet('dem_le',lid);if(!rec)return;
  if(!rec.values)rec.values=[];rec.values.push(val);rec.updated_at=Date.now();
  if(rec.sync_status==='synced')rec.sync_status='dirty';
  else if(rec.sync_status!=='dirty')rec.sync_status='pending';
  await dbPut('dem_le',rec);
  backupToLocalStorage(); // Backup ngay sau mỗi lần nhập số
  await renderS2();updateBadge();
}
async function saveHeSo(lid,val){
  var rec=await dbGet('dem_le',lid);if(!rec)return;
  rec.he_so=val;rec.updated_at=Date.now();
  if(rec.sync_status==='synced')rec.sync_status='dirty';
  else if(rec.sync_status!=='dirty')rec.sync_status='pending';
  await dbPut('dem_le',rec);
  delete pendingHeSo[lid]; // xóa pending sau khi DB ghi xong
  backupToLocalStorage(); // Backup ngay sau khi sửa hệ số
  updateBadge();
}

  pop.querySelector('.tdel').onclick=async function(e){e.stopPropagation();rec.values.splice(idx,1);rec.updated_at=Date.now();if(rec.sync_status==='synced')rec.sync_status='dirty';await dbPut('dem_le',rec);await renderS2();updateBadge();pop.remove();};

async function addNewMaterial(){
  var name=document.getElementById('nmName').value.trim();
  if(!name){toast('Bitte Bauteilname eingeben');return;}
  var gew=gewCtxGew;
  var don_vi=nmDonVi;
  var kieu_tinh=(don_vi==='m')?'CO_DAI':'CHI_DEM';

  // Get all existing DNs for this gewerk in current card
  var allRecs=await dbIdx('dem_le','ma_phong',curPhong.ma_phong);
  var dnSet=new Set();
  allRecs.filter(function(r){return r.nhom===gew&&!r.deleted&&r.grosse!=='Befestigung';})
    .forEach(function(r){dnSet.add(r.grosse);});
  var dns=Array.from(dnSet);
  if(dns.length===0){toast('Keine DN für '+gew+' vorhanden');return;}

  var ma_vl='VL_NEW_'+Date.now();

  // Add to vat_lieu IndexedDB (local)
  await dbPut('vat_lieu',{ma_vl:ma_vl,nhom:gew,ten_vl_german:name,don_vi:don_vi,kieu_tinh:kieu_tinh,is_new:true});

  // Create dem_le records for each DN of this gewerk
  for(var i=0;i<dns.length;i++){
    await dbPut('dem_le',{local_id:uuid(),sheet_id:null,
      ma_phong:curPhong.ma_phong,ma_vl:ma_vl,ten_vl_german:name,
      grosse:dns[i],nhom:gew,he_so:1,values:[],
      kieu_tinh:kieu_tinh,don_vi:don_vi,ghi_chu:'',
      created_at:Date.now(),updated_at:Date.now(),
      sync_status:'pending',deleted:false,card_id:curPhong.card_id||''});
  }

  // Push to GAS
  if(IS_GAS){
    try{
      await gsRun('serverAddMaterial',JSON.stringify({nhom:gew,ten_vl_german:name,don_vi:don_vi,kieu_tinh:kieu_tinh}));
    }catch(e){console.warn('serverAddMaterial:',e);}
  }

  closeSheet('NewMat');
  await renderS2();updateBadge();
  toast(name+' → '+dns.join(', '));
}

// Open the bsGew sheet. gew=gewerk name, locked=true khi từ + DN header
function openBsGew(gew, locked){
  bsGewGewerk=gew||'';bsGewLocked=!!locked;
  selectedDNsPerGew={};bsGewActiveGewerke=new Set();
  document.getElementById('nGewDN').value='';

  var lockedDiv=document.getElementById('bsGewLocked');
  var chipsDiv=document.getElementById('bsGewChips');
  var gewFld=lockedDiv.closest('.fld');
  var cardGewerke=curPhong&&curPhong.card_gewerke;

  if(locked&&gew){
    // Locked mode (từ + DN header): chỉ 1 gewerk, không chip
    if(gewFld)gewFld.style.display='none';
    lockedDiv.style.display='none';
    chipsDiv.style.display='none';
    bsGewActiveGewerke.add(gew);
    selectedDNsPerGew[gew]=new Set();
  } else {
    // Multi-chip mode: hiện tất cả gewerk của card
    if(gewFld)gewFld.style.display='';
    lockedDiv.style.display='none';
    chipsDiv.style.display='flex';chipsDiv.innerHTML='';
    var gewerkeToShow=(cardGewerke&&cardGewerke.length>0)?cardGewerke:ALL_GEWERKE;
    // Pre-select tất cả gewerk của card
    gewerkeToShow.forEach(function(g){
      bsGewActiveGewerke.add(g);
      selectedDNsPerGew[g]=new Set();
    });
    gewerkeToShow.forEach(function(g){
      var chip=document.createElement('button');
      chip.className='gew-chip sel'; // bắt đầu tất cả đều selected
      chip.textContent=g;
      chip.onclick=function(e){
        e.preventDefault();
        if(bsGewActiveGewerke.has(g)){
          bsGewActiveGewerke.delete(g);
          chip.classList.remove('sel');
        } else {
          bsGewActiveGewerke.add(g);
          if(!selectedDNsPerGew[g])selectedDNsPerGew[g]=new Set();
          chip.classList.add('sel');
        }
        renderDNSections();
      };
      chipsDiv.appendChild(chip);
    });
  }
  renderDNSections();
  showSheet('Gew');
}

// Render one DN section per active Gewerk
function renderDNSections(){
  var container=document.getElementById('dnSections');container.innerHTML='';
  bsGewActiveGewerke.forEach(function(gew){
    if(!selectedDNsPerGew[gew])selectedDNsPerGew[gew]=new Set();
    var gwDNs=selectedDNsPerGew[gew];
    var presets=DN_PRESETS[gew]||[];
    var cls=gewCls(gew);
    // Section header — màu theo Gewerk
    var hdr=document.createElement('div');
    hdr.className='gew-hdr '+cls;
    hdr.style.cssText='padding:5px 10px;font-size:12px;font-weight:700;border-radius:6px;margin:8px 0 5px;cursor:default';
    hdr.textContent=gew;
    container.appendChild(hdr);
    // DN chip row
    var row=document.createElement('div');
    row.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px';
    presets.forEach(function(dn){
      var chip=document.createElement('button');chip.className='ib';
      var isSel=gwDNs.has(dn);
      chip.style.cssText='padding:6px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid '+(isSel?'#0d47a1':'transparent');
      chip.style.background=isSel?'#1565c0':'#e3f2fd';
      chip.style.color=isSel?'#fff':'#1565c0';
      chip.textContent=dn;
      chip.onclick=function(e){
        e.preventDefault();
        if(gwDNs.has(dn)){gwDNs.delete(dn);chip.style.background='#e3f2fd';chip.style.color='#1565c0';chip.style.borderColor='transparent';}
        else{gwDNs.add(dn);chip.style.background='#1565c0';chip.style.color='#fff';chip.style.borderColor='#0d47a1';}
        updateDNTotalCount();
      };
      row.appendChild(chip);
    });
    container.appendChild(row);
    // Custom DN input — để thêm kích thước mới ngoài preset
    (function(g, gwDNs){
      var addRow=document.createElement('div');
      addRow.style.cssText='display:flex;gap:5px;margin-top:5px;align-items:center';
      var dnInp=document.createElement('input');
      dnInp.type='text';dnInp.placeholder='Eigene DN...';
      dnInp.setAttribute('inputmode','text');dnInp.setAttribute('autocomplete','off');
      dnInp.style.cssText='flex:1;padding:4px 8px;border:1.5px solid #c5d8f5;border-radius:6px;font-size:12px;min-width:0';
      var addBtn=document.createElement('button');
      addBtn.textContent='+';
      addBtn.style.cssText='padding:4px 12px;background:#1565c0;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0';
      function doAddDN(){
        var dn=(dnInp.value||'').trim();if(!dn)return;
        if(!DN_PRESETS[g])DN_PRESETS[g]=[];
        if(!DN_PRESETS[g].includes(dn)){DN_PRESETS[g].push(dn);saveCustomData();}
        gwDNs.add(dn);
        renderDNSections(); // re-render để chip mới hiện
      }
      addBtn.onclick=function(e){e.preventDefault();doAddDN();};
      dnInp.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();doAddDN();}};
      addRow.appendChild(dnInp);addRow.appendChild(addBtn);
      container.appendChild(addRow);
    })(gew, gwDNs);
  });
  updateDNTotalCount();
}

function updateDNTotalCount(){
  var total=0;
  bsGewActiveGewerke.forEach(function(g){if(selectedDNsPerGew[g])total+=selectedDNsPerGew[g].size;});
  document.getElementById('dnSelectedCount').textContent=total>0?'('+total+' ausgewählt)':'';
}

// ---- S3: Material Preview state ----
// s3Items = [{ nhom, dns, mats, selectedMats }, ...]  — one per Gewerk
var s3Items=[];
var s3HaltMats=[];var s3SelectedHaltMats=new Set();

async function goToS3(){
  var manualDN=document.getElementById('nGewDN').value.trim();
  var allVL=await dbGetAll('vat_lieu');
  var items=[];
  bsGewActiveGewerke.forEach(function(gew){
    var dns=Array.from(selectedDNsPerGew[gew]||[]);
    if(manualDN&&!dns.includes(manualDN))dns.push(manualDN);
    if(dns.length===0)return; // bỏ qua gewerk không chọn DN nào
    var matching=allVL.filter(function(v){return v.nhom===gew;});
    var seen={};var unique=[];
    matching.forEach(function(v){if(!seen[v.ten_vl_german]){seen[v.ten_vl_german]=true;unique.push(v);}});
    if(unique.length===0)unique=[{ma_vl:'VL_'+gew+'_ROHR',ten_vl_german:'Rohr',don_vi:'m',kieu_tinh:'CO_DAI',nhom:gew}];
    items.push({nhom:gew,dns:dns,mats:unique,selectedMats:new Set(unique.map(function(v){return v.ma_vl||v.ten_vl_german;}))});
  });
  if(items.length===0){toast('Bitte DN auswählen');return;}

  // Halterung — hiện nếu ít nhất 1 gewerk không phải Halterung
  var hasNonHalt=items.some(function(it){return it.nhom!=='Halterung';});
  var haltMats=allVL.filter(function(v){return v.nhom==='Halterung';});
  if(haltMats.length===0)haltMats=MOCK_VL.filter(function(v){return v.nhom==='Halterung';});
  var seenH={};var uniqH=[];
  haltMats.forEach(function(v){if(!seenH[v.ten_vl_german]){seenH[v.ten_vl_german]=true;uniqH.push(v);}});

  s3Items=items;
  s3HaltMats=hasNonHalt?uniqH:[];
  s3SelectedHaltMats=new Set(uniqH.map(function(v){return v.ma_vl||v.ten_vl_german;}));

  closeSheet('Gew');showScreen('s3');

function buildS3Row(v,selSet,c){
  var key=v.ma_vl||v.ten_vl_german;
  var sel=selSet.has(key);
  var row=document.createElement('div');row.className='s3-row';
  if(!sel)row.style.opacity='0.45';
  var tog=document.createElement('button');tog.className='s3-tog '+(sel?'on':'off');
  tog.innerHTML=sel?'&#10003;':'&#9675;';
  var name=document.createElement('span');name.className='s3-name';name.textContent=v.ten_vl_german;
  var unit=document.createElement('span');unit.className='s3-unit';
  unit.textContent=v.kieu_tinh==='CO_DAI'?'\u2194 m':'# Stk';
  function doToggle(){
    if(selSet.has(key)){selSet.delete(key);tog.className='s3-tog off';tog.innerHTML='&#9675;';row.style.opacity='0.45';}
    else{selSet.add(key);tog.className='s3-tog on';tog.innerHTML='&#10003;';row.style.opacity='1';}
    updateS3Count();
  }
  row.onclick=doToggle;tog.onclick=function(e){e.stopPropagation();doToggle();};
  row.appendChild(tog);row.appendChild(name);row.appendChild(unit);
  c.appendChild(row);
}

function renderS3(){
  var c=document.getElementById('s3Body');c.innerHTML='';
  // Section per Gewerk
  s3Items.forEach(function(item){
    var cls=gewCls(item.nhom);
    var hdr=document.createElement('div');
    hdr.className='gew-hdr '+cls;
    hdr.style.cssText='padding:6px 14px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px';
    hdr.textContent=item.nhom+' \u00b7 '+item.dns.join(', ');
    c.appendChild(hdr);
    item.mats.forEach(function(v){buildS3Row(v,item.selectedMats,c);});
  });
  // Halterung / Befestigung
  if(s3HaltMats.length>0){
    var hdr2=document.createElement('div');
    hdr2.style.cssText='padding:6px 14px 4px;font-size:11px;font-weight:700;color:#e65100;background:#fff3e0;text-transform:uppercase;letter-spacing:.5px;margin-top:8px';
    hdr2.textContent='Befestigung (Halterung)';
    c.appendChild(hdr2);
    s3HaltMats.forEach(function(v){buildS3Row(v,s3SelectedHaltMats,c);});
  }
  updateS3Count();
}


function updateS3Count(){
  var totalEntries=0;
  var summary=s3Items.map(function(it){
    var entries=it.selectedMats.size*it.dns.length;
    totalEntries+=entries;
    return it.nhom+': '+it.selectedMats.size+'/'+it.mats.length+' \u00b7 '+it.dns.length+' DN';
  }).join(' | ');
  var haltCount=s3SelectedHaltMats.size;
  if(s3HaltMats.length>0){summary+=' | Halt: '+haltCount+'/'+s3HaltMats.length;totalEntries+=haltCount;}
  document.getElementById('s3Count').textContent=summary;
  document.getElementById('btnS3Ok').textContent='\u2713 '+totalEntries+' Eintr\u00e4ge erstellen';
}

function toggleAllS3(){
  var allSel=s3Items.every(function(it){return it.selectedMats.size===it.mats.length;})&&s3SelectedHaltMats.size===s3HaltMats.length;
  if(allSel){
    s3Items.forEach(function(it){it.selectedMats.clear();});
    s3SelectedHaltMats.clear();
  } else {
    s3Items.forEach(function(it){it.mats.forEach(function(v){it.selectedMats.add(v.ma_vl||v.ten_vl_german);});});
    s3HaltMats.forEach(function(v){s3SelectedHaltMats.add(v.ma_vl||v.ten_vl_german);});
  }
  renderS3();
}

}

async function confirmMaterials(){
  var btn=document.getElementById('btnS3Ok');btn.disabled=true;btn.textContent='...';
  try{
    var existing=await dbIdx('dem_le','ma_phong',curPhong.ma_phong);
    var existKeys={};existing.forEach(function(r){if(!r.deleted)existKeys[r.nhom+'|'+r.grosse+'|'+r.ten_vl_german]=true;});
    var created=0;

    // Tạo cấu kiện cho từng Gewerk + DN
    for(var ii=0;ii<s3Items.length;ii++){
      var item=s3Items[ii];
      var nhom=item.nhom;
      var dnList=item.dns;
      var selMats=item.mats.filter(function(v){return item.selectedMats.has(v.ma_vl||v.ten_vl_german);});
      for(var di=0;di<dnList.length;di++){
        var dn=dnList[di];
        for(var i=0;i<selMats.length;i++){
          var v=selMats[i];
          if(existKeys[nhom+'|'+dn+'|'+v.ten_vl_german])continue;
          await dbPut('dem_le',{local_id:uuid(),sheet_id:null,ma_phong:curPhong.ma_phong,ma_vl:v.ma_vl||'',ten_vl_german:v.ten_vl_german,grosse:dn,nhom:nhom,he_so:1,values:[],kieu_tinh:v.kieu_tinh,don_vi:v.don_vi||'',ghi_chu:'',created_at:Date.now(),updated_at:Date.now(),sync_status:'pending',deleted:false,card_id:curPhong.card_id||''});
          created++;
        }
      }
    }

    // Halterung (Befestigung) — tạo 1 lần nếu có
    var haltAdded=0;
    var hasNonHalt=s3Items.some(function(it){return it.nhom!=='Halterung';});
    if(hasNonHalt&&s3HaltMats.length>0){
      var selHalt=s3HaltMats.filter(function(v){return s3SelectedHaltMats.has(v.ma_vl||v.ten_vl_german);});
      for(var j=0;j<selHalt.length;j++){
        var h=selHalt[j];
        if(existKeys['Halterung|Befestigung|'+h.ten_vl_german])continue;
        await dbPut('dem_le',{local_id:uuid(),sheet_id:null,ma_phong:curPhong.ma_phong,ma_vl:h.ma_vl||'',ten_vl_german:h.ten_vl_german,grosse:'Befestigung',nhom:'Halterung',he_so:1,values:[],kieu_tinh:h.kieu_tinh,don_vi:h.don_vi||'',ghi_chu:'',created_at:Date.now(),updated_at:Date.now(),sync_status:'pending',deleted:false,card_id:curPhong.card_id||''});
        haltAdded++;
      }
    }

    selectedDNsPerGew={};document.getElementById('nGewDN').value='';
    showScreen('s2');await renderS2();updateBadge();
    var msg=created+' Materialien erstellt';
    if(haltAdded>0)msg+=' + Halterung ('+haltAdded+')';
    toast(msg);
  }catch(e){
    console.error('confirmMaterials:',e);
    toast('Fehler beim Erstellen: '+(e.message||e));
  }finally{
    btn.disabled=false;updateS3Count();
  }
}

function makePhotoFilename(ma_phong,tang,ten_phong,seq){
  var d=new Date();
  var ds=d.getFullYear().toString()+(d.getMonth()+1).toString().padStart(2,'0')+d.getDate().toString().padStart(2,'0');
  function san(s){return (s||'').replace(/[^a-zA-Z0-9\u00C0-\u024F\u1E00-\u1EFF]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');}
  var seq3=seq.toString().padStart(3,'0');
  return ds+'_AufmaB_'+san(tang)+'_'+san(ma_phong)+'_'+san(ten_phong)+'_'+seq3+'.jpg';
}
async function capturePhoto(event){

  reader.readAsDataURL(file);event.target.value='';
}

async function pullOnly(){

    return;
  }
  var btn=document.getElementById('btnPull');
  if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    if(IS_GAS){
      var js=await gsRun('serverPull');var data=JSON.parse(js);
      if(!data.success)throw new Error('Pull failed');
      for(var i=0;i<(data.phong||[]).length;i++){var p=data.phong[i];var ex=await dbGet('phong',p.id);if(!ex||ex.synced!==false){p.synced=true;p.is_new=false;await dbPut('phong',p);}}
      for(var i=0;i<(data.vat_lieu||[]).length;i++){data.vat_lieu[i].is_new=false;await dbPut('vat_lieu',data.vat_lieu[i]);}

  finally{if(btn){btn.disabled=false;btn.textContent='\u2193';}}
}

async function saveAndSync(){
  // Offline check — không để treo nút
  if(IS_GAS&&!navigator.onLine){
    toast('📡 Đang offline — dữ liệu đã lưu local, sync khi có mạng');
    return;
  }
  var btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    if(IS_GAS){
      // Step 1: Upload pending images first, collect Drive URLs
      var allA=await dbGetAll('anh');
      var pendA=allA.filter(function(a){return a.ma_phong===curPhong.ma_phong&&a.sync_status==='pending'&&a.data;});
      var anhUrls=[];
      btn.textContent='Uploading '+pendA.length+' Fotos...';
      for(var i=0;i<pendA.length;i++){
        try{
          var a=pendA[i];
          var b64=a.data;if(b64.indexOf(',')>=0)b64=b64.split(',')[1];
          var ijs=await gsRun('serverUploadImage',JSON.stringify({ma_phong:a.ma_phong,filename:a.filename,data:b64}));
          var ires=JSON.parse(ijs);
          if(ires.success){
            a.drive_url=ires.drive_url;a.sync_status='synced';
            await dbPut('anh',a);
            anhUrls.push({drive_url:ires.drive_url,filename:ires.filename});
          }
        }catch(ie){console.error('Img:',ie);}
      }
      // Include already-synced images — EXCLUDE ones just uploaded above (they're already in anhUrls)
      var justUploadedIds=new Set(pendA.map(function(a){return a.anh_id;}));
      var syncedA=allA.filter(function(a){return a.ma_phong===curPhong.ma_phong&&a.sync_status==='synced'&&a.drive_url&&!justUploadedIds.has(a.anh_id);});
      var allAnh=anhUrls.concat(syncedA.map(function(a){return{drive_url:a.drive_url,filename:a.filename};}));

      // Step 2: Build dem_le records
      btn.textContent='Syncing data...';
      var allD=await dbIdx('dem_le','ma_phong',curPhong.ma_phong);
      // Chỉ push pending/dirty — KHÔNG push synced (tránh tạo row trùng trong Sheet)
      var toP=allD.filter(function(r){
        if(r.deleted)return false;
        if(r.sync_status==='synced')return false; // đã sync rồi, bỏ qua
        var vals=r.values||[];
        if(vals.length===0)return false;
        var total=vals.reduce(function(a,b){return a+Number(b);},0);
        return total>0;
      });

      // Sort: oldest card first, then nhom → grosse → ten_vl_german
      var _cm2={};
      toP.forEach(function(r){var cid=r.card_id||r.ma_phong;if(!_cm2[cid]||r.created_at<_cm2[cid])_cm2[cid]=r.created_at||0;});
      toP.sort(function(a,b){
        var ca=a.card_id||a.ma_phong,cb=b.card_id||b.ma_phong;
        var ta=_cm2[ca]||0,tb=_cm2[cb]||0;
        if(ta!==tb)return ta-tb;
        if(ca!==cb)return ca.localeCompare(cb);
        var nc=(a.nhom||'').localeCompare(b.nhom||'');if(nc)return nc;
        var gc=(a.grosse||'').localeCompare(b.grosse||'');if(gc)return gc;
        return(a.ten_vl_german||'').localeCompare(b.ten_vl_german||'');
      });

      // Build anh_urls_by_room for this single room
      var anhUrlsByRoom2={};
      anhUrlsByRoom2[curPhong.ma_phong]=allAnh;

      var payload={
        dem_le: toP.map(function(r){
          return {
            local_id: r.local_id,
            sheet_id: r.sheet_id,
            ma_phong: r.ma_phong,
            nhom: r.nhom||'',
            ma_vl: r.ma_vl,
            ten_vl_german: r.ten_vl_german,
            grosse: r.grosse||'',
            values: r.values||[],
            kieu_tinh: r.kieu_tinh,
            don_vi: r.don_vi||'',
            he_so: pendingHeSo[r.local_id]!==undefined?pendingHeSo[r.local_id]:(r.he_so||1),
            ghi_chu: r.ghi_chu||'',
            card_id: r.card_id||''
          };
        }),
        anh_urls_by_room: anhUrlsByRoom2,
        vat_lieu_new:[],
        phong_new:[]
      };

      if(toP.length===0&&newV.length===0&&pendA.length===0){
        toast('✓ Không có dữ liệu mới — đã đồng bộ hết rồi');
      } else {
        var pjs=await gsRun('serverPush',JSON.stringify(payload));
        var res=JSON.parse(pjs);
        if(res.success){
          var mapped=res.mapped_ids||{};
          for(var i=0;i<toP.length;i++){
            var fresh=await dbGet('dem_le',toP[i].local_id)||toP[i];
            fresh.sync_status='synced';
            if(mapped[toP[i].local_id])fresh.sheet_id=mapped[toP[i].local_id];
            await dbPut('dem_le',fresh);
          }
          toast('✓ Đã lưu '+toP.length+' dòng mới lên Google Sheet');
        } else {
          throw new Error(res.error||'Push failed');
        }
      }
    } else {
      // Local mock
      var allD=await dbIdx('dem_le','ma_phong',curPhong.ma_phong);
      for(var i=0;i<allD.length;i++){allD[i].sync_status='synced';await dbPut('dem_le',allD[i]);}
      toast('[Mock] Đã lưu '+allD.length+' dòng ✓');
    }
    updateBadge();
  }catch(err){
    console.error('Save:',err);toast('Lỗi: '+(err.message||err));
  }finally{
    btn.disabled=false;btn.innerHTML='&#128190; Save';
  }
}

// ============================================================
// SYNC ENGINE — fetch() → GAS API (GitHub Pages) + mock fallback (local preview)
// ============================================================
var GAS_API = 'https://script.google.com/macros/s/AKfycbyEFk4tESM5s8bRfCx7krOVu54OFJqUC9-TUW5VxkDToRs6xL3sI109zqhSIMEp5jFB/exec';
var IS_GAS = (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1');

// Pull dem_app records from Sheet into IndexedDB (shared between doSync & init refresh)
// Rules: import new records; update card_id always; update values only if local is 'synced'
async function processDemApp(demAppData){
  if(!demAppData||demAppData.length===0)return 0;
  var allLocal=await dbGetAll('dem_le');
  var bySheetId={};
  allLocal.forEach(function(d){if(d.sheet_id)bySheetId[d.sheet_id]=d;});
  var count=0;
  for(var i=0;i<demAppData.length;i++){
    var row=demAppData[i];
    if(!row.sheet_id||!row.ma_phong||!row.ten_vl_german)continue;
    if((row.values||[]).length===0)continue;
    var local=bySheetId[row.sheet_id];
    if(!local){
      var newRec={
        local_id:uuid(),sheet_id:row.sheet_id,
        ma_phong:row.ma_phong,nhom:row.nhom||'',
        ten_vl_german:row.ten_vl_german,grosse:row.grosse||'',
        he_so:row.he_so||1,values:row.values,
        kieu_tinh:row.kieu_tinh,don_vi:row.don_vi||'',
        ghi_chu:row.ghi_chu||'',card_id:row.card_id||row.ma_phong+'|'+(row.nhom||''),
        card_note:'',sync_status:'synced',deleted:false,
        created_at:Date.now(),updated_at:Date.now()
      };
      await dbPut('dem_le',newRec);
      bySheetId[row.sheet_id]=newRec;count++;
    } else {
      var changed=false;
      // card_id — luôn update từ Sheet (giữ đúng multi-gewerk grouping)
      var sheetCardId=row.card_id||'';
      if(sheetCardId&&sheetCardId!==(local.card_id||'')){local.card_id=sheetCardId;changed=true;}
      // kieu_tinh — quan trọng cho hiển thị decimal vs integer
      if(row.kieu_tinh&&row.kieu_tinh!==local.kieu_tinh){local.kieu_tinh=row.kieu_tinh;changed=true;}
      // don_vi (m/Stk) — đơn vị đo
      var sheetDonVi=row.don_vi||'';
      if(sheetDonVi&&sheetDonVi!==(local.don_vi||'')){local.don_vi=sheetDonVi;changed=true;}
      // he_so — update ngay cả khi dirty/pending, nếu local vẫn là mặc định (1)
      // Lý do: record bị push với he_so=1 (bug cũ) thì local=1, nhưng Sheet có thể có =2
      // Chỉ không ghi đè khi user đã đặt he_so > 1 cục bộ
      var sheetHeSo=row.he_so||1;
      if(sheetHeSo!==(local.he_so||1)){
        if(local.sync_status==='synced'||(local.he_so||1)===1){
          local.he_so=sheetHeSo;changed=true;
        }
      }
      // values + ghi_chu — chỉ update nếu local đã synced (không ghi đè thay đổi đang chờ)
      if(local.sync_status==='synced'){
        var sheetTotal=(row.values||[]).reduce(function(a,b){return a+b;},0);
        var localTotal=(local.values||[]).reduce(function(a,b){return a+Number(b);},0);
        if(Math.abs(sheetTotal-localTotal)>0.001){local.values=row.values;changed=true;}
        var sheetGhi=row.ghi_chu||'';
        if(sheetGhi!==(local.ghi_chu||'')){local.ghi_chu=sheetGhi;changed=true;}
      }
      if(changed){local.updated_at=Date.now();await dbPut('dem_le',local);count++;}
    }
  }
  return count;
}

function gsRun(fn,arg){
  // Dùng fetch() → GAS API (chạy từ GitHub Pages, không cần google.script.run)
  return new Promise(function(ok,fail){
    var done=false;
    var timer=setTimeout(function(){if(!done){done=true;fail(new Error('Timeout 15s — kiểm tra mạng'));}},15000);
    function wrap(cb){return function(v){if(!done){done=true;clearTimeout(timer);cb(v);}};}
    var url,opts;
    if(fn==='serverPull'){
      url=GAS_API+'?action=pull';
      opts={method:'GET'};
    } else {
      url=GAS_API;
      // Không set Content-Type để tránh CORS preflight
      opts={method:'POST',body:JSON.stringify({action:fn,payload:arg})};
    }
    fetch(url,opts)
      .then(function(r){return r.text();})
      .then(wrap(ok))
      .catch(wrap(fail));
  });
}

async function doSync(){
  if(IS_GAS&&!navigator.onLine){
    toast('📡 Offline — dữ liệu an toàn trong máy');
    return;
  }
  var btn=document.getElementById('syncBtn');
  if(btn){btn.disabled=true;btn.textContent='Sync...';}

  try{
    if(IS_GAS){
      // ---- PULL from Google Sheet ----
      var js=await gsRun('serverPull');
      var data=JSON.parse(js);
      if(!data.success)throw new Error('Pull failed');
      for(var i=0;i<(data.phong||[]).length;i++){
        var p=data.phong[i];var ex=await dbGet('phong',p.id);
        if(!ex||ex.synced!==false){p.synced=true;p.is_new=false;await dbPut('phong',p);}
      }
      for(var i=0;i<(data.vat_lieu||[]).length;i++){data.vat_lieu[i].is_new=false;await dbPut('vat_lieu',data.vat_lieu[i]);}

      // ---- PULL dem_le từ DEM_APP (sync 2 chiều: Sheet → Device) ----
      // Nếu Sheet bị xóa (trống) → mark tất cả local records là dirty để force push lại
      if((data.dem_app||[]).length===0){
        var allLocalCheck=await dbGetAll('dem_le');
        var hadSynced=allLocalCheck.filter(function(d){return!d.deleted&&d.sync_status==='synced';});
        if(hadSynced.length>0){
          for(var i=0;i<hadSynced.length;i++){hadSynced[i].sync_status='dirty';await dbPut('dem_le',hadSynced[i]);}
          toast('Sheet trống — sẽ đẩy lại '+hadSynced.length+' records...');
        }
      }
      var pulled=await processDemApp(data.dem_app||[]);
      if(pulled>0)console.log('Pulled '+pulled+' records from Sheet');

      // ---- PUSH to Google Sheet ----
      var allD=await dbGetAll('dem_le');
      var toP=allD.filter(function(r){return!r.deleted&&(r.sync_status==='pending'||r.sync_status==='dirty');});

      // Fix 1: Sort — oldest card first, then nhom → grosse → ten_vl_german
      var _cmin={};
      toP.forEach(function(r){var cid=r.card_id||r.ma_phong;if(!_cmin[cid]||r.created_at<_cmin[cid])_cmin[cid]=r.created_at||0;});
      toP.sort(function(a,b){
        var ca=a.card_id||a.ma_phong,cb=b.card_id||b.ma_phong;
        var ta=_cmin[ca]||0,tb=_cmin[cb]||0;
        if(ta!==tb)return ta-tb;
        if(ca!==cb)return ca.localeCompare(cb);
        var nc=(a.nhom||'').localeCompare(b.nhom||'');if(nc)return nc;
        var gc=(a.grosse||'').localeCompare(b.grosse||'');if(gc)return gc;
        return(a.ten_vl_german||'').localeCompare(b.ten_vl_german||'');
      });

      var allV=await dbGetAll('vat_lieu');var newV=allV.filter(function(v){return v.is_new;});
      var allPh=await dbGetAll('phong');var newPh=allPh.filter(function(p){return p.is_new;});

      // Fix 4: Upload images FIRST so Drive URLs go into Sheet rows
      var allA=await dbGetAll('anh');
      var pendA=allA.filter(function(a){return a.sync_status==='pending'&&a.data;});
      var anhUrlsByRoom={};
      for(var i=0;i<pendA.length;i++){
        try{
          var a=pendA[i];var b64=a.data;if(b64.indexOf(',')>=0)b64=b64.split(',')[1];
          var ijs=await gsRun('serverUploadImage',JSON.stringify({ma_phong:a.ma_phong,filename:a.filename,data:b64}));
          var ires=JSON.parse(ijs);
          if(ires.success){
            a.drive_url=ires.drive_url;a.sync_status='synced';await dbPut('anh',a);
            if(!anhUrlsByRoom[a.ma_phong])anhUrlsByRoom[a.ma_phong]=[];
            anhUrlsByRoom[a.ma_phong].push({drive_url:ires.drive_url,filename:ires.filename});
          }
        }catch(ie){console.error('Img:',ie);}
      }
      // Also include already-synced images (not just uploaded now)
      var justUploadedIds=new Set(pendA.map(function(a){return a.anh_id;}));
      allA.filter(function(a){return a.sync_status==='synced'&&a.drive_url&&!justUploadedIds.has(a.anh_id);}).forEach(function(a){
        if(!anhUrlsByRoom[a.ma_phong])anhUrlsByRoom[a.ma_phong]=[];
        anhUrlsByRoom[a.ma_phong].push({drive_url:a.drive_url,filename:a.filename});
      });

      if(toP.length>0||newV.length>0||newPh.length>0){
        var payload={
          dem_le:toP.map(function(r){return{local_id:r.local_id,sheet_id:r.sheet_id,ma_phong:r.ma_phong,nhom:r.nhom,ma_vl:r.ma_vl,ten_vl_german:r.ten_vl_german,grosse:r.grosse,values:r.values,he_so:pendingHeSo[r.local_id]!==undefined?pendingHeSo[r.local_id]:(r.he_so||1),kieu_tinh:r.kieu_tinh,don_vi:r.don_vi,ghi_chu:r.ghi_chu,card_note:r.card_note||'',card_id:r.card_id||''};}),
          vat_lieu_new:newV,
          phong_new:newPh.map(function(p){return{id:p.id,ma_phong:p.ma_phong,ten_phong:p.ten_phong,tang:p.tang,khu_vuc:p.khu_vuc};}),
          anh_urls_by_room:anhUrlsByRoom
        };
        var pjs=await gsRun('serverPush',JSON.stringify(payload));
        var res=JSON.parse(pjs);
        if(res.success){
          var mapped=res.mapped_ids||{};
          for(var i=0;i<toP.length;i++){var fresh2=await dbGet('dem_le',toP[i].local_id)||toP[i];fresh2.sync_status='synced';if(mapped[toP[i].local_id])fresh2.sheet_id=mapped[toP[i].local_id];await dbPut('dem_le',fresh2);}
          for(var i=0;i<newV.length;i++){newV[i].is_new=false;await dbPut('vat_lieu',newV[i]);}
          for(var i=0;i<newPh.length;i++){newPh[i].is_new=false;newPh[i].synced=true;await dbPut('phong',newPh[i]);}
        }
      }
      toast('Sync OK!');
    } else {
      // ---- LOCAL MOCK ----
      for(var i=0;i<MOCK_PHONG.length;i++){var p=MOCK_PHONG[i];p.synced=true;p.is_new=false;var ex=await dbGet('phong',p.id);if(!ex||ex.synced!==false)await dbPut('phong',p);}
      for(var i=0;i<MOCK_VL.length;i++){MOCK_VL[i].is_new=false;await dbPut('vat_lieu',MOCK_VL[i]);}
      toast('Mock sync OK — '+MOCK_PHONG.length+' Räume');
    }
    await renderS1();
  }catch(err){
    console.error('Sync:',err);toast('Sync Fehler: '+(err.message||err));
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML='&#8635;';}updateBadge();
  }
}

async function repairCardIds(){
  var all=await dbGetAll('dem_le');
  var active=all.filter(function(d){return!d.deleted;});

  // Nhóm theo ma_phong
  var byRoom={};
  active.forEach(function(d){
    if(!byRoom[d.ma_phong])byRoom[d.ma_phong]=[];
    byRoom[d.ma_phong].push(d);
  });

  var fixedIds=0,removed=0;

  for(var maPhong in byRoom){
    var recs=byRoom[maPhong];

    // Bước 1: Tìm card_id "tốt nhất" cho phòng này
    // = card_id có nhiều Gewerk nhất (nhiều dấu + nhất trong phần [1])
    var bestCardId='';var bestScore=-1;
    recs.forEach(function(d){
      var parts=(d.card_id||'').split('|');
      var score=(parts[1]||'').split('+').filter(Boolean).length;
      if(score>bestScore){bestScore=score;bestCardId=d.card_id||'';}
    });

    // Nếu không có card_id multi-gewerk → tự tạo từ tất cả Gewerk trong phòng
    if(bestScore<=1){
      var gews=[];
      recs.forEach(function(d){
        var g=d.nhom||'';
        if(g&&g!=='Halterung'&&!gews.includes(g))gews.push(g);
      });
      if(gews.length>0)bestCardId=maPhong+'|'+gews.join('+');
    }
    if(!bestCardId)continue;

    // Bước 2: Dedup — cùng (nhom+grosse+ten_vl_german) → giữ record có tổng cao nhất
    var seen={};
    for(var i=0;i<recs.length;i++){
      var d=recs[i];
      var key=(d.nhom||'')+'|'+(d.grosse||'')+'|'+(d.ten_vl_german||'');
      var total=(d.values||[]).reduce(function(a,b){return a+Number(b);},0);
      if(!seen[key]){
        seen[key]={rec:d,total:total};
      } else if(total>seen[key].total){
        // Record hiện tốt hơn — xóa record cũ
        var old=seen[key].rec;
        old.deleted=true;old.sync_status='dirty';old.updated_at=Date.now();
        await dbPut('dem_le',old);removed++;
        seen[key]={rec:d,total:total};
      } else {
        // Record hiện là bản sao — xóa đi
        d.deleted=true;d.sync_status='dirty';d.updated_at=Date.now();
        await dbPut('dem_le',d);removed++;
      }
    }

    // Bước 3: Cập nhật card_id cho tất cả records còn lại
    for(var k in seen){
      var rec=seen[k].rec;
      if(!rec.deleted&&rec.card_id!==bestCardId){
        rec.card_id=bestCardId;rec.updated_at=Date.now();
        if(rec.sync_status==='synced')rec.sync_status='dirty';
        await dbPut('dem_le',rec);fixedIds++;
      }
    }
  }

  await renderS1();updateBadge();
  toast('🔧 Repair xong: '+fixedIds+' cards gộp, '+removed+' bản sao xóa');
}
